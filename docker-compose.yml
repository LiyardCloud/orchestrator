services:
  gateway:
    build:
      context: ../gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      SERVICE_KEY: ${SERVICE_KEY}
      ROUTES: "api-dataroom.liyard.cloud=http://dataroom-api:5001"
    depends_on:
      - dataroom-api

  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dataroom-api:
    build:
      context: ../dataroom/backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/dataroom_db
      SECRET_KEY: ${SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_AUTH_REQUIRED: ${FIREBASE_AUTH_REQUIRED:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - dataroom_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # journal-api:
  #   build:
  #     context: ../journal/backend
  #   restart: unless-stopped
  #   ports:
  #     - "5002:5002"
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/journal_db
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
  dataroom_uploads:
